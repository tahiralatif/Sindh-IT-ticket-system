<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Government Ticket System</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:20px;">
            <div style="width:60px;height:60px;background:var(--sindh-green);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin-bottom:10px;">
                <i class="fa fa-user-plus"></i>
            </div>
            <h1 style="font-size:20px;">Create Account</h1>
            <small style="color:var(--text-secondary);">Register as a citizen to submit tickets</small>
        </div>
        {% if error %}
        <div style="background:#fee;border:1px solid #fcc;border-radius:6px;padding:10px 14px;margin-bottom:16px;color:#c33;font-size:14px;">
            <i class="fa fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" required placeholder="Enter your full name">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required minlength="6" placeholder="Min 6 characters">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" class="form-control" placeholder="03XX-XXXXXXX">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
                <i class="fa fa-user-plus"></i> Create Account
            </button>
        </form>
        <div class="footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
