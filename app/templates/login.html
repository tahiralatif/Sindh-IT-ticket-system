<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Government Ticket System</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:20px;">
            <div style="width:60px;height:60px;background:var(--sindh-green);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin-bottom:10px;">
                <i class="fa fa-landmark"></i>
            </div>
            <h1 style="font-size:20px;">Science & IT Department</h1>
            <small style="color:var(--text-secondary);">Government of Sindh</small>
        </div>
        <p class="subtitle">Sign in to the Ticket Management System</p>
        {% if error %}
        <div style="background:#fee;border:1px solid #fcc;border-radius:6px;padding:10px 14px;margin-bottom:16px;color:#c33;font-size:14px;">
            <i class="fa fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
                <i class="fa fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div class="footer">
            Don't have an account? <a href="/register">Register here</a>
        </div>
        <div style="text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
            <small style="color:var(--text-muted);">
                <i class="fa fa-shield-alt"></i> Government of Sindh — Secure Portal
            </small>
        </div>
    </div>
</div>
</body>
</html>
